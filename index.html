<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Lamentometro</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lamentometro">
<meta name="theme-color" content="#163832">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EEF3EE;
    --paper-2:#E2EBE3;
    --ink:#163832;
    --ink-soft:#4B655F;
    --line: rgba(22,56,50,0.16);
    --red:#C6432F;
    --red-bg:#F7E3DE;
    --amber:#C98A1F;
    --amber-bg:#F6ECD6;
    --green:#3E7A57;
    --green-bg:#E1EDE3;
    --card:#FFFFFF;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:calc(72px + env(safe-area-inset-bottom));
  }
  .topbar{
    padding:18px 18px 14px;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    z-index:5;
  }
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .brand{
    font-family:'IBM Plex Mono',monospace;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .trip-name{font-size:20px;font-weight:800;margin-top:2px;}
  .trip-switch{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    background:var(--card);
    border:1px solid var(--line);
    border-radius:8px;
    padding:6px 9px;
  }
  .screen{padding:20px 18px 8px;flex:1;}
  h1,h2,h3{margin:0 0 6px;}
  h2{font-size:17px;font-weight:700;}
  p{line-height:1.5;color:var(--ink-soft);}
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:10px;
    padding:13px 18px;
    font-size:15px;
    font-weight:600;
    font-family:'Inter',sans-serif;
    cursor:pointer;
    width:100%;
  }
  .btn:active{opacity:0.85;}
  .btn.secondary{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn.danger{background:var(--red);}
  .btn.small{width:auto;padding:9px 14px;font-size:13px;}
  input,textarea{
    width:100%;
    font-family:'Inter',sans-serif;
    font-size:15px;
    padding:12px;
    border:1px solid var(--line);
    border-radius:10px;
    background:var(--paper-2);
    color:var(--ink);
  }
  textarea{font-family:'IBM Plex Mono',monospace;font-size:12px;min-height:120px;resize:vertical;}
  label{font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px;}
  .field{margin-bottom:14px;}
  .steps{padding-left:18px;margin:0 0 14px;color:var(--ink-soft);}
  .steps li{margin-bottom:8px;line-height:1.5;}
  a{color:var(--ink);}

  /* Player select */
  .player-btn{
    width:100%;text-align:left;background:var(--paper-2);border:1px solid var(--line);
    border-radius:10px;padding:14px;margin-bottom:8px;font-size:15px;font-weight:600;cursor:pointer;
  }

  /* Tab bar */
  .tabbar{
    position:fixed;bottom:0;left:0;right:0;
    display:flex;
    background:var(--card);
    border-top:1px solid var(--line);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    max-width:520px;margin:0 auto;
  }
  .tab{
    flex:1;text-align:center;background:none;border:none;
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.04em;
    color:var(--ink-soft);padding:6px 2px;cursor:pointer;text-transform:uppercase;
  }
  .tab .ic{display:block;font-size:18px;margin-bottom:2px;}
  .tab.active{color:var(--ink);font-weight:700;}

  /* Oggi tab */
  .today-date{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);text-transform:capitalize;margin-bottom:2px;}
  .tap-wrap{display:flex;flex-direction:column;align-items:center;padding:30px 0 10px;}
  .tap-count{font-family:'IBM Plex Mono',monospace;font-size:64px;font-weight:700;line-height:1;margin:10px 0 4px;}
  .tap-btn{
    width:180px;height:180px;border-radius:50%;
    background:var(--ink);color:var(--paper);
    border:none;font-size:15px;font-weight:700;font-family:'IBM Plex Mono',monospace;
    text-transform:uppercase;letter-spacing:0.05em;
    display:flex;align-items:center;justify-content:center;text-align:center;
    box-shadow:0 6px 0 rgba(0,0,0,0.15);
    cursor:pointer;
  }
  .tap-btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,0.15);}
  .tap-sub{color:var(--ink-soft);font-size:13px;margin-top:14px;text-align:center;}

  /* Chart / thermometer */
  .chart-row{
    display:flex;align-items:flex-end;gap:14px;
    border-bottom:1px dashed var(--line);
    padding:0 4px 12px;
    margin-bottom:0;
  }
  .chart-item{flex:1;display:flex;flex-direction:column;align-items:center;}
  .therm-track{
    width:26px;height:110px;border-radius:13px;background:var(--paper-2);
    border:1px solid var(--line);
    display:flex;align-items:flex-end;overflow:hidden;position:relative;
  }
  .therm-fill{width:100%;border-radius:13px 13px 0 0;transition:height 0.3s;}
  .therm-fill.zero{background:var(--green);opacity:0.35;}
  .therm-fill.mid{background:var(--amber);}
  .therm-fill.top{background:var(--red);}
  .chart-count{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;margin-top:8px;}
  .chart-name{font-size:11px;color:var(--ink-soft);margin-top:2px;text-align:center;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rank-badge{
    font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;
    background:var(--paper-2);border-radius:5px;padding:1px 6px;margin-bottom:4px;color:var(--ink-soft);
  }
  .rank-badge.gold{background:var(--red-bg);color:var(--red);}

  /* Prescription card */
  .rx{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px;position:relative;overflow:hidden;
  }
  .rx::before{
    content:"℞";position:absolute;top:8px;right:14px;font-size:46px;color:var(--line);font-weight:700;
  }
  .rx-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-soft);}
  .rx-name{font-size:16px;font-weight:700;margin:4px 0 10px;}
  .rx-text{font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace;line-height:1.4;}
  .rx-stamp{
    display:inline-block;margin-top:12px;font-family:'IBM Plex Mono',monospace;font-size:10px;
    border:1px solid var(--red);color:var(--red);border-radius:6px;padding:3px 8px;transform:rotate(-3deg);
  }

  .chip{
    display:inline-flex;align-items:center;gap:6px;background:var(--paper-2);border:1px solid var(--line);
    border-radius:20px;padding:7px 12px;font-size:13px;margin:0 6px 8px 0;
  }
  .chip button{background:none;border:none;color:var(--ink-soft);font-size:13px;cursor:pointer;padding:0;}
  .row{display:flex;gap:8px;}
  .row > *{flex:1;}
  .muted{color:var(--ink-soft);font-size:13px;}
  .code-box{
    font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:700;letter-spacing:0.12em;
    background:var(--paper-2);border:1px dashed var(--line);border-radius:10px;padding:14px;text-align:center;margin-bottom:10px;
  }
  .divider{height:1px;background:var(--line);margin:16px 0;}
  .empty{
    text-align:center;padding:30px 14px;color:var(--ink-soft);font-size:14px;
  }
  .history-item{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .history-item:last-child{border-bottom:none;}
  select{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:var(--paper-2);font-family:'Inter',sans-serif;font-size:15px;}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
/* ============ STATE ============ */
let db=null, tripRef=null, tripListenerFn=null;
const state={
  screen:'loading', // loading | setup-firebase | trip-select | join-trip | new-trip | player-select | main
  config:null,
  trips:[], // [{id,name}]
  activeTripId:null,
  tripData:null, // {meta:{name,pegniPool:{}},players:{},days:{},assigned:{}}
  playerId:null,
  playerName:null,
  activeTab:'oggi',
  error:null
};

const DEFAULT_PEGNI = [
  {text:"Offri il gelato a tutto il gruppo", level:"facile"},
  {text:"Fai la sveglia a tutti domani mattina", level:"facile"},
  {text:"Prepara la colazione per tutti domani", level:"facile"},
  {text:"Fai un balletto imbarazzante davanti a tutti", level:"medio"},
  {text:"Parla in rima per la prossima ora", level:"medio"},
  {text:"Porta gli zaini di tutti per un'ora", level:"medio"},
  {text:"Rifai il letto di un altro giocatore", level:"medio"},
  {text:"Canta una canzone a scelta del gruppo, in pubblico", level:"difficile"},
  {text:"Fai da autista/navigatore designato domani", level:"difficile"},
  {text:"Zero lamentele consentite domani, pena doppio pegno", level:"difficile"}
];
const PEGNO_LEVELS = ['facile','medio','difficile'];
const LEVEL_LABEL = {facile:'Facile', medio:'Medio', difficile:'Difficile'};
const LEVEL_COLOR = {facile:'var(--green)', medio:'var(--amber)', difficile:'var(--red)'};

/* ============ HELPERS ============ */
function todayStr(d){ d=d||new Date(); const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
function prettyDate(dstr){
  const d=new Date(dstr+'T12:00:00');
  return d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
}
function mondayOf(d){
  d=new Date(d); const day=d.getDay(); const diff=d.getDate()-day+(day===0?-6:1);
  const m=new Date(d); m.setDate(diff); m.setHours(0,0,0,0); return m;
}
function currentWeekDates(){
  const mon=mondayOf(new Date());
  const arr=[];
  for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i); arr.push(todayStr(d)); }
  return arr;
}
function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function parseFirebaseConfig(text){
  try{
    const match=text.match(/{[\s\S]*}/);
    const objText=match?match[0]:text;
    const obj=Function('"use strict"; return ('+objText+')')();
    if(obj && obj.apiKey && obj.databaseURL) return obj;
  }catch(e){}
  return null;
}
function save(key,val){ localStorage.setItem(key, typeof val==='string'?val:JSON.stringify(val)); }
function load(key){ const v=localStorage.getItem(key); if(v===null) return null; try{return JSON.parse(v);}catch(e){return v;} }
function getDeviceId(){
  let id=load('lam_device_id');
  if(!id){ id='dev_'+Math.random().toString(36).slice(2)+Date.now().toString(36); save('lam_device_id', id); }
  return id;
}
function isCreator(){
  return !!(state.tripData && state.tripData.meta && state.tripData.meta.creatorDevice === getDeviceId());
}
function hasCreator(){
  return !!(state.tripData && state.tripData.meta && state.tripData.meta.creatorDevice);
}
function actionClaimCreator(){
  if(hasCreator()) return;
  db.ref(`trips/${state.activeTripId}/meta/creatorDevice`).set(getDeviceId());
}
function avatarHtml(photo,name,size){
  size=size||40;
  if(photo){
    return `<img src="${photo}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;border:2px solid var(--line);flex-shrink:0">`;
  }
  const initial=(name||'?').trim().charAt(0).toUpperCase();
  return `<div style="width:${size}px;height:${size}px;min-width:${size}px;border-radius:50%;background:var(--paper-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--ink-soft);font-size:${Math.round(size*0.4)}px;flex-shrink:0">${esc(initial)}</div>`;
}
function handlePhotoInput(inputEl, previewId){
  const file=inputEl.files && inputEl.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const size=220;
      const canvas=document.createElement('canvas');
      canvas.width=size; canvas.height=size;
      const ctx=canvas.getContext('2d');
      const scale=Math.max(size/img.width, size/img.height);
      const w=img.width*scale, h=img.height*scale;
      ctx.drawImage(img,(size-w)/2,(size-h)/2,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',0.72);
      state.pendingPhoto=dataUrl;
      const prev=document.getElementById(previewId);
      if(prev) prev.innerHTML=avatarHtml(dataUrl,'',72);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ============ INIT ============ */
const BUILTIN_FIREBASE_CONFIG = {
  apiKey: "AIzaSyCMvugAxong-Tmd0qcV2FOLbgTOma-xdqg",
  authDomain: "lamentometer2.firebaseapp.com",
  databaseURL: "https://lamentometer2-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lamentometer2",
  storageBucket: "lamentometer2.firebasestorage.app",
  messagingSenderId: "881409293146",
  appId: "1:881409293146:web:edaae1ebd92f8944d21163"
};
function init(){
  const cfg=load('lam_config') || BUILTIN_FIREBASE_CONFIG;
  state.config=cfg;
  const ok=initFirebase(cfg);
  if(!ok) return;
  const trips=load('lam_trips')||[];
  state.trips=trips;
  const active=load('lam_activeTrip');
  if(trips.length===0){ state.screen='trip-select'; render(); return; }
  attachTrip(active && trips.find(t=>t.id===active) ? active : trips[0].id);
}
function initFirebase(cfg){
  if(typeof firebase === 'undefined'){
    db=null;
    state.error="NETLOAD";
    state.screen='setup-firebase';
    render();
    return false;
  }
  try{
    if(firebase.apps && firebase.apps.length){
      firebase.app().delete().catch(()=>{});
    }
    firebase.initializeApp(cfg);
    db=firebase.database();
    return true;
  }catch(e){
    db=null;
    state.error="Errore di configurazione Firebase: "+(e && e.message ? e.message : e)+". Ricontrolla di aver incollato apiKey, authDomain e databaseURL corretti (e che il Realtime Database sia stato creato nella console).";
    state.screen='setup-firebase';
    render();
    return false;
  }
}

function attachTrip(tripId){
  if(tripRef && tripListenerFn) tripRef.off('value', tripListenerFn);
  state.activeTripId=tripId;
  save('lam_activeTrip', tripId);
  state.screen='loading';
  render();
  tripRef=db.ref('trips/'+tripId);
  tripListenerFn=tripRef.on('value', snap=>{
    const val=snap.val();
    if(!val){ state.error="Questo viaggio non esiste più."; state.screen='trip-select'; render(); return; }
    state.tripData=val;
    if(state.trips.some(t=>t.id===tripId) === false){
      state.trips.push({id:tripId,name:val.meta && val.meta.name || tripId});
      save('lam_trips', state.trips);
    } else if(val.meta && val.meta.name){
      const t=state.trips.find(t=>t.id===tripId);
      if(t) t.name=val.meta.name;
      save('lam_trips', state.trips);
    }
    const pd=load('lam_player_'+tripId);
    if(pd && val.players && val.players[pd.id]){
      state.playerId=pd.id; state.playerName=val.players[pd.id].name;
      state.screen='main';
    } else {
      state.screen='player-select';
    }
    render();
  });
}

/* ============ ACTIONS ============ */
function actionSaveFirebaseConfig(){
  const txt=document.getElementById('fbConfigInput').value;
  const cfg=parseFirebaseConfig(txt);
  if(!cfg){ state.error="Non riesco a leggere questa configurazione. Ricontrolla di aver incollato tutto l'oggetto firebaseConfig."; render(); return; }
  save('lam_config',cfg);
  state.config=cfg; state.error=null;
  const ok=initFirebase(cfg);
  if(!ok) return;
  state.screen='trip-select';
  render();
}

function actionCreateTrip(){
  if(!db){ state.error="Il database non è collegato. Torna a Setup e ricontrolla la configurazione Firebase."; state.screen='setup-firebase'; render(); return; }
  const name=document.getElementById('newTripName').value.trim();
  if(!name){ state.error="Dai un nome al viaggio."; render(); return; }
  const id=genCode();
  const pegniObj={}; DEFAULT_PEGNI.forEach(p=>{ pegniObj[db.ref().push().key]=p; });
  db.ref('trips/'+id+'/meta').set({name, createdAt:Date.now(), creatorDevice:getDeviceId(), pegniPool:pegniObj}).then(()=>{
    state.trips.push({id,name}); save('lam_trips', state.trips);
    state.error=null;
    attachTrip(id);
  });
}

function actionJoinTrip(){
  if(!db){ state.error="Il database non è collegato. Torna a Setup e ricontrolla la configurazione Firebase."; state.screen='setup-firebase'; render(); return; }
  const code=document.getElementById('joinCodeInput').value.trim().toUpperCase();
  if(!code){ return; }
  db.ref('trips/'+code+'/meta').once('value').then(snap=>{
    if(!snap.exists()){ state.error="Nessun viaggio trovato con questo codice."; render(); return; }
    const name=snap.val().name;
    if(!state.trips.some(t=>t.id===code)){ state.trips.push({id:code,name}); save('lam_trips', state.trips); }
    state.error=null;
    attachTrip(code);
  });
}

function actionSwitchTrip(id){ attachTrip(id); }

function actionSelectPlayer(id,name){
  save('lam_player_'+state.activeTripId, {id,name});
  state.playerId=id; state.playerName=name; state.screen='main';
  render();
}

function actionAddPlayer(){
  const name=document.getElementById('newPlayerName').value.trim();
  if(!name){ return; }
  const ref=db.ref('trips/'+state.activeTripId+'/players').push();
  const photo=state.pendingPhoto || null;
  ref.set({name, photo}).then(()=>{ state.pendingPhoto=null; actionSelectPlayer(ref.key, name); });
}

function actionChangeMyPhoto(){
  if(!state.pendingPhoto) return;
  db.ref(`trips/${state.activeTripId}/players/${state.playerId}/photo`).set(state.pendingPhoto).then(()=>{
    state.pendingPhoto=null; render();
  });
}

function actionSwitchPlayer(){
  localStorage.removeItem('lam_player_'+state.activeTripId);
  state.playerId=null; state.screen='player-select';
  render();
}

function actionAddComplaint(){
  const t=todayStr();
  const ref=db.ref(`trips/${state.activeTripId}/days/${t}/${state.playerId}`);
  ref.transaction(cur=>(cur||0)+1, (err, committed, snap)=>{
    if(!err && committed && snap){
      const newVal=snap.val();
      if(newVal>1){ autoAssignPegno(state.playerId, state.playerName, newVal, t); }
    }
  });
}

function autoAssignPegno(playerId, playerName, complaintNumber, dateStr){
  const pool=state.tripData.meta.pegniPool || {};
  const keys=Object.keys(pool);
  if(!keys.length) return; // nessun pegno in pool: si salta silenziosamente
  // difficoltà in base a quante lamentele "a pagamento" ha fatto oggi (la prima è gratis)
  const paidCount=complaintNumber-1; // 1 = prima a pagamento -> facile, 2 -> medio, 3+ -> difficile
  const tierIndex=Math.min(paidCount-1, PEGNO_LEVELS.length-1);
  let chosenKey=null, chosenLevel=null;
  for(let i=tierIndex;i>=0 && !chosenKey;i--){
    const matches=keys.filter(k=>pool[k].level===PEGNO_LEVELS[i]);
    if(matches.length){ chosenKey=matches[Math.floor(Math.random()*matches.length)]; chosenLevel=PEGNO_LEVELS[i]; }
  }
  if(!chosenKey){
    for(let i=tierIndex+1;i<PEGNO_LEVELS.length && !chosenKey;i++){
      const matches=keys.filter(k=>pool[k].level===PEGNO_LEVELS[i]);
      if(matches.length){ chosenKey=matches[Math.floor(Math.random()*matches.length)]; chosenLevel=PEGNO_LEVELS[i]; }
    }
  }
  if(!chosenKey){ chosenKey=keys[Math.floor(Math.random()*keys.length)]; chosenLevel=pool[chosenKey].level||'facile'; }
  const entry=pool[chosenKey];
  db.ref(`trips/${state.activeTripId}/assigned/${dateStr}`).push().set({
    playerId, playerName, pegno:entry.text, level:chosenLevel, complaintNumber, ts:Date.now()
  });
}

function actionAdminAdjust(playerId, delta){
  if(!isCreator()) return;
  const t=state.adminDate || todayStr();
  const ref=db.ref(`trips/${state.activeTripId}/days/${t}/${playerId}`);
  ref.transaction(cur=>{ const v=(cur||0)+delta; return v<0?0:v; });
}

function actionAdminSet(playerId, inputEl){
  if(!isCreator()) return;
  const t=state.adminDate || todayStr();
  let v=parseInt(inputEl.value,10);
  if(isNaN(v) || v<0) v=0;
  db.ref(`trips/${state.activeTripId}/days/${t}/${playerId}`).set(v);
}

function actionAddPegno(){
  if(!isCreator()) return;
  const input=document.getElementById('newPegnoInput');
  const levelSel=document.getElementById('newPegnoLevel');
  const val=input.value.trim();
  if(!val) return;
  const level=levelSel ? levelSel.value : 'facile';
  db.ref(`trips/${state.activeTripId}/meta/pegniPool`).push({text:val, level});
  input.value='';
}

function actionRemovePegno(key){
  if(!isCreator()) return;
  db.ref(`trips/${state.activeTripId}/meta/pegniPool/${key}`).remove();
}

function setTab(tab){ state.activeTab=tab; render(); }

/* ============ RENDER ============ */
function render(){
  const app=document.getElementById('app');
  if(state.screen==='loading'){ app.innerHTML=renderLoading(); return; }
  if(state.screen==='setup-firebase'){ app.innerHTML=renderSetupFirebase(); return; }
  if(state.screen==='trip-select'){ app.innerHTML=renderTripSelect(); return; }
  if(state.screen==='player-select'){ app.innerHTML=renderPlayerSelect(); return; }
  if(state.screen==='main'){ app.innerHTML=renderMain(); return; }
}

function renderLoading(){
  return `<div class="screen"><p class="mono">Caricamento…</p></div>`;
}

function renderSetupFirebase(){
  return `
  <div class="topbar"><div class="brand">Lamentometro</div><div class="trip-name">Configurazione</div></div>
  <div class="screen">
    <div class="card">
      <h2>Collega il database gratuito</h2>
      <p>Per far sincronizzare i telefoni di tutto il gruppo in tempo reale serve un database gratuito su Firebase (Google). Si fa una volta sola, dura 2 minuti, non serve carta di credito.</p>
      <ol class="steps">
        <li>Vai su <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> e crea un nuovo progetto (nome a piacere).</li>
        <li>Nel menu a sinistra apri <b>Realtime Database</b> → crea database → scegli "Avvia in modalità di test".</li>
        <li>Vai su Impostazioni progetto (icona ingranaggio) → sezione "Le tue app" → crea una Web App (icona &lt;/&gt;).</li>

    <button class="player-btn" onclick="actionSwitchTrip('${t.id}')">${esc(t.name)} <span class="muted mono">· ${t.id}</span></button>

  <div class="topbar"><div class="brand">Lamentometro</div><div class="trip-name">I tuoi viaggi</div></div>

  <div class="topbar"><div class="brand">Lamentometro</div><div class="trip-name">${esc(state.tripData.meta.name)}</div></div>

    <p>Scegli il tuo nome se è già nella lista, oppure aggiungiti. Questo telefono se lo ricorderà.</p>

function renderMain(){
  const tripSwitcher = state.trips.length>1 ? `
    <select onchange="actionSwitchTrip(this.value)">
      ${state.trips.map(t=>`<option value="${t.id}" ${t.id===state.activeTripId?'selected':''}>${esc(t.name)}</option>`).join('')}

  if(state.activeTab==='oggi') body=renderTabOggi();
  else if(state.activeTab==='giorno') body=renderTabGiorno();

  else if(state.activeTab==='impostazioni') body=renderTabImpostazioni();

  return `
  <div class="topbar">
    <div class="topbar-row">

        <div class="brand">Lamentometro</div>

      <div style="max-width:150px">${tripSwitcher}</div>
    </div>

  <div class="screen">${body}</div>

    <button class="tab ${state.activeTab==='impostazioni'?'active':''}" onclick="setTab('impostazioni')"><span class="ic">⚙</span>Setup</button>

function xTallyHtml(count){
  if(count<=0) return `<span class="muted" style="font-size:13px">Ancora nessuna lamentela oggi</span>`;
  let html='';
  for(let i=1;i<=count;i++){
    const free=i===1;
    html+=`<span class="mono" style="font-size:24px;font-weight:700;display:inline-block;margin:0 3px 6px;color:${free?'var(--green)':'var(--red)'}">✕</span>`;
    if(i%5===0 && i<count) html+=`<span style="display:inline-block;width:12px"></span>`;
  }
  return html;
}

function renderTabOggi(){
  const t=todayStr();
  const myCount=(state.tripData.days && state.tripData.days[t] && state.tripData.days[t][state.playerId])||0;
  const myPhoto = state.tripData.players && state.tripData.players[state.playerId] ? state.tripData.players[state.playerId].photo : null;
  return `
    <div class="today-date">${prettyDate(t)}</div>
    <div class="tap-wrap">
      ${avatarHtml(myPhoto, state.playerName, 56)}
      <div class="mono muted" style="font-size:12px;text-transform:uppercase;letter-spacing:0.08em;margin-top:8px">${esc(state.playerName)}</div>
      <div class="tap-count">${myCount}</div>
      <div class="muted" style="margin-bottom:14px">lamentele registrate oggi</div>
      <div style="max-width:280px;text-align:center;margin-bottom:14px">${xTallyHtml(myCount)}</div>
      <button class="tap-btn" onclick="actionAddComplaint()">+1<br>lamentela</button>
      <div class="tap-sub">La prima lamentela del giorno è gratis (in verde). Dalla seconda in poi scatta subito un pegno, sempre più difficile.</div>
    </div>
  `;
}

function chartHtml(entries, maxVal){
  return entries.map(({name,count,photo},i)=>{
    const pct = maxVal>0 ? Math.max(count/maxVal*100, count>0?14:4) : 4;
    const cls = count===0 ? 'zero' : (count===maxVal && maxVal>0 ? 'top' : 'mid');
    const badge = i===0 && maxVal>0 ? `<div class="rank-badge gold">TOP</div>` : `<div class="rank-badge">#${i+1}</div>`;
    return `<div class="chart-item">
      ${badge}
      ${avatarHtml(photo,name,32)}
      <div class="therm-track" style="margin-top:6px"><div class="therm-fill ${cls}" style="height:${pct}%"></div></div>
      <div class="chart-count">${count}</div>
      <div class="chart-name">${esc(name)}</div>
    </div>`;
  }).join('');
}

function renderTabGiorno(){
  const t=todayStr();
  const players=state.tripData.players||{};
  const days=(state.tripData.days && state.tripData.days[t])||{};
  const entries=Object.keys(players).map(id=>({name:players[id].name, count:days[id]||0, photo:players[id].photo})).sort((a,b)=>b.count-a.count);
  const maxVal=entries.length?entries[0].count:0;
  const assignedToday=(state.tripData.assigned && state.tripData.assigned[t]) || {};
  const todayKeys=Object.keys(assignedToday).sort((a,b)=>assignedToday[a].ts-assignedToday[b].ts);
  let rx='';
  if(todayKeys.length){
    rx=todayKeys.map(k=>{
      const a=assignedToday[k];
      const winnerPhoto = players[a.playerId] ? players[a.playerId].photo : null;
      return `<div class="rx" style="margin-top:12px">
        <div class="rx-label">Pegno · lamentela #${a.complaintNumber} · ${esc(LEVEL_LABEL[a.level]||a.level)}</div>
        <div style="display:flex;align-items:center;gap:10px;margin:6px 0 10px">
          ${avatarHtml(winnerPhoto, a.playerName, 36)}
          <div class="rx-name" style="margin:0">${esc(a.playerName)}</div>
        </div>
        <div class="rx-text">${esc(a.pegno)}</div>
        <div class="rx-stamp" style="border-color:${LEVEL_COLOR[a.level]||'var(--red)'};color:${LEVEL_COLOR[a.level]||'var(--red)'}">ESEGUITO ENTRO STASERA</div>
      </div>`;
    }).join('');
  } else {
    rx=`<p class="muted" style="margin-top:14px">Nessun pegno ancora oggi: il primo scatta in automatico dalla seconda lamentela di ciascuno.</p>`;
  }
  return `
    <div class="today-date">Classifica di oggi · ${prettyDate(t)}</div>
    <div class="card"><div class="chart-row">${entries.length?chartHtml(entries,maxVal):'<div class="empty">Nessun giocatore ancora.</div>'}</div></div>
    ${rx}
    ${state.error?`<p style="color:var(--red);margin-top:10px">${esc(state.error)}</p>`:''}
  `;
}

function renderTabSettimana(){
  const players=state.tripData.players||{};
  const week=currentWeekDates();
  const totals={};
  Object.keys(players).forEach(id=>totals[id]=0);
  week.forEach(dstr=>{
    const day=(state.tripData.days && state.tripData.days[dstr])||{};
    Object.keys(day).forEach(id=>{ if(totals[id]!==undefined) totals[id]+=day[id]; });
  });
  const entries=Object.keys(players).map(id=>({name:players[id].name, count:totals[id]||0, photo:players[id].photo})).sort((a,b)=>b.count-a.count);
  const maxVal=entries.length?entries[0].count:0;
  const hasPlayers=entries.length>0;
  const minVal=hasPlayers?Math.min(...entries.map(e=>e.count)):0;
  const calmest=hasPlayers?entries.filter(e=>e.count===minVal):[];
  const calmHtml = hasPlayers ? `
    <div class="card" style="background:var(--green-bg);border-color:var(--green)">
      <div class="rx-label" style="color:var(--green)">Più zen della settimana</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:8px">
        ${calmest.map(c=>`<div style="display:flex;align-items:center;gap:8px">${avatarHtml(c.photo,c.name,28)}<span style="font-weight:600">${esc(c.name)}</span></div>`).join('')}
      </div>
      <p class="muted" style="margin:8px 0 0">${minVal===0?'Zero lamentele questa settimana. Rispetto.':`Solo ${minVal} lamentel${minVal===1?'a':'e'} questa settimana.`}</p>
    </div>` : '';
  return `
    <div class="today-date">Classifica settimanale · lun–dom</div>
    <div class="card"><div class="chart-row">${entries.length?chartHtml(entries,maxVal):'<div class="empty">Nessun giocatore ancora.</div>'}</div></div>
    ${calmHtml}
    <div class="card">
      <h2>Il tuo calendario</h2>
      ${renderCalendar(state.playerId)}
    </div>
    <div class="card">
      <h2>Storico pegni</h2>
      ${renderPegniHistory()}
    </div>
  `;
}

function renderCalendar(playerId){
  const now=new Date();
  const year=now.getFullYear(), month=now.getMonth();
  const first=new Date(year,month,1);
  const startOffset=(first.getDay()+6)%7; // lunedì=0
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthLabel=now.toLocaleDateString('it-IT',{month:'long',year:'numeric'});
  const dowLabels=['L','M','M','G','V','S','D'];
  let cells='';
  for(let i=0;i<startOffset;i++) cells+=`<div></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const dstr=todayStr(new Date(year,month,day));
    const count=(state.tripData.days && state.tripData.days[dstr] && state.tripData.days[dstr][playerId])||0;
    let bg='var(--paper-2)', bd='var(--line)';
    if(count===1){ bg='var(--green-bg)'; bd='var(--green)'; }
    else if(count===2||count===3){ bg='var(--amber-bg)'; bd='var(--amber)'; }
    else if(count>=4){ bg='var(--red-bg)'; bd='var(--red)'; }
    const isToday = dstr===todayStr();
    cells+=`<div style="aspect-ratio:1;border-radius:8px;background:${bg};border:${isToday?'2px solid var(--ink)':'1px solid '+bd};display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--ink-soft)">${day}</div>`;
  }
  return `
    <div class="mono muted" style="font-size:12px;text-transform:capitalize;margin-bottom:8px">${monthLabel}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
      ${dowLabels.map(l=>`<div class="mono muted" style="font-size:10px;text-align:center">${l}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>
    <div class="muted" style="font-size:11px;margin-top:10px">🟩 1 lamentela (gratis) · 🟧 2–3 · 🟥 4+</div>
  `;
}

function renderPegniHistory(){
  const assigned=state.tripData.assigned||{};
  const dates=Object.keys(assigned).sort().reverse();
  if(!dates.length) return `<p class="muted">Ancora nessun pegno assegnato.</p>`;
  return dates.map(d=>{
    const dayEntries=assigned[d];
    const keys=Object.keys(dayEntries).sort((a,b)=>dayEntries[a].ts-dayEntries[b].ts);
    return keys.map(k=>{
      const a=dayEntries[k];
      return `<div class="history-item">
        <span>${prettyDate(d)}<br><b>${esc(a.playerName)}</b> <span class="mono muted" style="font-size:11px">${esc(LEVEL_LABEL[a.level]||'')}</span></span>
        <span style="text-align:right">${esc(a.pegno)}</span>
      </div>`;
    }).join('');
  }).join('');
}

function renderTabPegni(){
  const pool=state.tripData.meta.pegniPool||{};
  const keys=Object.keys(pool);
  const editable=isCreator();
  const groups=PEGNO_LEVELS.map(level=>{
    const levelKeys=keys.filter(k=>pool[k].level===level);
    if(!levelKeys.length && !editable) return '';
    const chips=levelKeys.map(k=>editable
      ? `<span class="chip">${esc(pool[k].text)} <button onclick="actionRemovePegno('${k}')">✕</button></span>`
      : `<span class="chip">${esc(pool[k].text)}</span>`
    ).join('');
    return `<div style="margin-bottom:14px">
      <div class="rx-label" style="color:${LEVEL_COLOR[level]}">${LEVEL_LABEL[level]}</div>
      <div style="margin-top:6px">${chips || '<p class="muted" style="margin:4px 0 0">Nessuno.</p>'}</div>
    </div>`;
  }).join('');
  const editSection = editable ? `
      <div class="divider"></div>
      <div class="row">
        <input id="newPegnoInput" placeholder="Nuovo pegno...">
      </div>
      <div class="row" style="margin-top:8px">
        <select id="newPegnoLevel">
          <option value="facile">Facile</option>
          <option value="medio">Medio</option>
          <option value="difficile">Difficile</option>
        </select>
        <button class="btn small" style="width:auto" onclick="actionAddPegno()">Aggiungi</button>
      </div>` : `
      <div class="divider"></div>
      <p class="muted">Solo chi ha creato il viaggio può aggiungere o rimuovere pegni.</p>`;
  return `
    <h2>Pool dei pegni</h2>
    <p>La prima lamentela del giorno è gratis. Dalla seconda in poi scatta subito un pegno: più ti lamenti nello stesso giorno, più sale la difficoltà.</p>
    <div class="card">
      ${keys.length?groups:'<p class="muted">Nessun pegno in lista ancora.</p>'}
      ${editSection}
    </div>
    <div class="card">
      <h2>Storico</h2>
      ${renderPegniHistory()}
    </div>
  `;
}

function renderTabAdmin(){
  if(!isCreator()){
    return `<div class="empty">Questa sezione è riservata all'amministratore del viaggio.</div>`;
  }
  const t=state.adminDate || todayStr();
  const players=state.tripData.players||{};
  const days=(state.tripData.days && state.tripData.days[t])||{};
  const rows=Object.keys(players).map(id=>{
    const count=days[id]||0;
    return `<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:10px;padding:12px">
      ${avatarHtml(players[id].photo, players[id].name, 36)}
      <div style="flex:1;font-weight:600">${esc(players[id].name)}</div>
      <button class="btn small secondary" style="width:36px;padding:8px 0" onclick="actionAdminAdjust('${id}',-1)">−</button>
      <input class="mono" style="width:52px;text-align:center;padding:8px 4px" value="${count}" onchange="actionAdminSet('${id}',this)">
      <button class="btn small secondary" style="width:36px;padding:8px 0" onclick="actionAdminAdjust('${id}',1)">+</button>
    </div>`;
  }).join('');
  return `
    <h2>Gestione lamentele</h2>
    <p>Correggi o azzera le lamentele registrate per errore. Visibile solo a te come amministratore.</p>
    <div class="field">
      <label>Giorno da modificare</label>
      <input type="date" value="${t}" onchange="state.adminDate=this.value; render()">
    </div>
    ${rows || '<div class="empty">Nessun giocatore ancora.</div>'}
  `;
}

    </div>
    <div class="card">
      <h2>Giocatori</h2>

    </div>
    <div class="card">
      <h2>Questo telefono</h2>
      <p>Sei registrato come <b>${esc(state.playerName)}</b> su questo viaggio, su questo telefono.</p>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        ${avatarHtml(myPhoto, state.playerName, 48)}
        <div style="flex:1">
          <input type="file" accept="image/*" onchange="handlePhotoInput(this,'myPhotoPreview')">
          <div id="myPhotoPreview"></div>
        </div>
      </div>
      <button class="btn secondary" onclick="actionChangeMyPhoto()">Salva nuova foto</button>
      <div class="divider"></div>
      <button class="btn secondary" onclick="actionSwitchPlayer()">Non sono io / cambia giocatore</button>
    </div>
    <div class="card">
      <h2>Altri viaggi</h2>
      <button class="btn secondary" onclick="state.screen='trip-select';render()">Gestisci / crea nuovo viaggio</button>
    </div>
  `;
}

init();
</script>
</body>
</html>
